services:
  - type: web
    name: voxrad
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: VOXRAD_WEB_PASSWORD
        generateValue: true
      - key: VOXRAD_WORKING_DIR
        value: /data/working
