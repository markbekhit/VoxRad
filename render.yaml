services:
  - type: web
    name: voxrad
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: VOXRAD_WEB_PASSWORD
        generateValue: true
      - key: VOXRAD_WORKING_DIR
        value: /data/working
      # Set your OpenAI API keys in the Render dashboard:
      # - key: VOXRAD_TRANSCRIPTION_API_KEY
      #   value: sk-...
      # - key: VOXRAD_TEXT_API_KEY
      #   value: sk-...
