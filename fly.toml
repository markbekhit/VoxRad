# Fly.io configuration for VoxRad
# Docs: https://fly.io/docs/reference/configuration/

app = "voxrad-v-hkvq"
primary_region = "syd"

[build]

[env]
  VOXRAD_WORKING_DIR = "/data/working"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "voxrad_config"
  destination = "/root/.voxrad"

[[mounts]]
  source = "voxrad_data"
  destination = "/data/working"
