# Fly.io configuration for VoxRad

app = "voxrad-v-hkvq"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  VOXRAD_WORKING_DIR = "/data/working"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# Single volume in /data/working for templates and reports.
# /root/.voxrad is ephemeral — API keys are loaded from Fly secrets (env vars).
[[mounts]]
  source = "voxrad_data"
  destination = "/data/working"
