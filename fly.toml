# Fly.io configuration for VoxRad

app = "voxrad-v-hkvq"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "immediate"

[env]
  VOXRAD_WORKING_DIR = "/data/working"
  VOXRAD_DB_PATH     = "/data/users.db"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

[[mounts]]
  source      = "voxrad_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
