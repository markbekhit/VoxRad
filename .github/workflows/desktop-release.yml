name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and uploads the
# NSIS .exe, MSI, and auto-update bundle (.nsis.zip) to a GitHub Release.
#
# Triggers on push to main that changes desktop/.trigger-release.
#
# Signing key: rsign format (scrypt KDF, empty password), embedded in the
# Bundle step env. Generated with `cargo tauri signer generate --ci -p ""`.
# The matching pubkey is in desktop/src-tauri/tauri.conf.json.

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.13). Leave blank to auto-read."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install tauri-cli
        shell: pwsh
        run: |
          cargo install tauri-cli --version "^2" --force 2>&1
          Write-Host "tauri-cli version: $(cargo tauri --version 2>&1)"

      - name: Verify frontend assets
        shell: pwsh
        run: |
          if (-not (Test-Path "src/index.html")) { throw "src/index.html not found" }
          Write-Host "Frontend assets OK"

      - name: Bundle (NSIS + MSI + updater .nsis.zip)
        id: bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Set-Location src-tauri
          cargo tauri build --verbose 2>&1
          $exit = $LASTEXITCODE
          Write-Host "cargo tauri build exit=$exit"
          if ($exit -ne 0) { exit $exit }

      - name: Verify updater artifacts
        id: verify
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $sig = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $zip = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sig -and $zip) {
            Write-Host "UPDATER OK: $($zip.Name) + $($sig.Name)"
            "HAVE_UPDATER=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "WARNING: updater artifacts missing"
            Write-Host "Bundle contents:"
            if (Test-Path $bundle) { Get-ChildItem -Recurse $bundle | Select-Object FullName, Length }
            "HAVE_UPDATER=false" >> $env:GITHUB_OUTPUT
          }

      - name: Collect release artifacts
        id: collect
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Get-ChildItem -Recurse -Path $bundle -Include *.exe,*.msi | ForEach-Object { Copy-Item $_.FullName $out }
          Get-ChildItem -Recurse -Path $bundle -Include *.nsis.zip,*.nsis.zip.sig | ForEach-Object { Copy-Item $_.FullName $out }
          Write-Host "Collected: $(Get-ChildItem $out | Select-Object -ExpandProperty Name)"

      - name: Generate update.json
        if: steps.verify.outputs.HAVE_UPDATER == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag = "${{ steps.ver.outputs.TAG }}"
          $out = "release-artifacts"
          $repo = "${{ github.repository }}"
          $sigFile = Get-ChildItem $out -Filter "*.nsis.zip.sig" | Select-Object -First 1
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $zipFile = Get-ChildItem $out -Filter "*.nsis.zip" | Select-Object -First 1
          $url = "https://github.com/$repo/releases/download/$tag/$($zipFile.Name)"
          $manifest = [ordered]@{
            version = $version
            notes = "See release notes: https://github.com/$repo/releases/tag/$tag"
            pub_date = (Get-Date -UTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $url
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 "$out/update.json"
          Write-Host "update.json:"
          Get-Content "$out/update.json"

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows-${{ steps.ver.outputs.VERSION }}
          path: desktop/release-artifacts/
          if-no-files-found: warn

      - name: Create GitHub Release
        if: steps.ver.outputs.VERSION != '' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true

      - name: Push diagnostics to ci-diagnostics branch
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add("# CI Diagnostics — Run ${{ github.run_id }}")
          $lines.Add("")
          $lines.Add("| Key | Value |")
          $lines.Add("|-----|-------|")
          $lines.Add("| Run ID | ${{ github.run_id }} |")
          $lines.Add("| SHA | ${{ github.sha }} |")
          $lines.Add("| Job status | ${{ job.status }} |")
          $lines.Add("| Time | $(Get-Date -UTC -Format 'u') |")
          $lines.Add("| tauri-cli | $(cargo tauri --version 2>&1) |")
          $lines.Add("")
          $lines.Add("## Bundle directory")
          $bd = "src-tauri/target/release/bundle"
          if (Test-Path $bd) {
            foreach ($f in (Get-ChildItem -Recurse $bd)) {
              $lines.Add("- ``$($f.Name)`` ($($f.Length) bytes)")
            }
          } else {
            $lines.Add("(does not exist)")
          }
          $lines.Add("")
          $lines.Add("## Release artifacts")
          if (Test-Path "release-artifacts") {
            foreach ($f in (Get-ChildItem "release-artifacts")) {
              $lines.Add("- ``$($f.Name)`` ($($f.Length) bytes)")
            }
          } else {
            $lines.Add("(none)")
          }
          $diagText = $lines -join "`n"
          Write-Host "=== DIAG ==="
          Write-Host $diagText
          Write-Host "=== END DIAG ==="

          $diagFile = "$env:RUNNER_TEMP\ci-diag.md"
          $diagText | Set-Content -Encoding UTF8 $diagFile

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          $repoUrl = "https://x-access-token:$env:GITHUB_TOKEN@github.com/${{ github.repository }}.git"

          git clone --branch ci-diagnostics --depth 1 $repoUrl "$env:RUNNER_TEMP\ci-diag-clone" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ci-diagnostics branch not found, cloning main and creating branch"
            git clone --depth 1 $repoUrl "$env:RUNNER_TEMP\ci-diag-clone" 2>&1
            Set-Location "$env:RUNNER_TEMP\ci-diag-clone"
            git checkout -b ci-diagnostics 2>&1
          } else {
            Set-Location "$env:RUNNER_TEMP\ci-diag-clone"
          }

          Copy-Item $diagFile ci-diag.md
          git add ci-diag.md
          git commit -m "ci: diag run=${{ github.run_id }} status=${{ job.status }}"
          git push origin ci-diagnostics 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Diagnostics pushed to ci-diagnostics branch"
          } else {
            Write-Host "Git push to ci-diagnostics failed (exit $LASTEXITCODE)"
          }
