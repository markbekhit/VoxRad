name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and publishes a
# GitHub Release with the NSIS .exe installer, MSI installer, and the
# Tauri v2 updater artifacts (.exe + .exe.sig + update.json).

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Leave blank to auto-read."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install tauri-cli
        shell: pwsh
        run: |
          cargo install tauri-cli --version "^2" --force 2>&1
          Write-Host "tauri-cli version: $(cargo tauri --version 2>&1)"

      - name: Verify frontend assets
        shell: pwsh
        run: |
          if (-not (Test-Path "src/index.html")) { throw "src/index.html not found" }
          Write-Host "Frontend assets OK"

      - name: Bundle (NSIS + MSI + updater artifacts)
        id: bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Set-Location src-tauri
          $logFile = "$env:RUNNER_TEMP\tauri-build.log"
          cargo tauri build --verbose 2>&1 | Tee-Object -FilePath $logFile
          $exit = $LASTEXITCODE
          Write-Host "cargo tauri build exit=$exit"
          if ($exit -ne 0) { exit $exit }

      - name: Dump bundle directory tree (BASH)
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p "$RUNNER_TEMP/diag"
          DUMP="$RUNNER_TEMP/diag/bundle-tree.txt"
          echo "RUNNER_TEMP=$RUNNER_TEMP" > "$DUMP"
          echo "PWD=$(pwd)" >> "$DUMP"
          echo "" >> "$DUMP"
          BD="src-tauri/target/release/bundle"
          echo "Bundle directory: $BD" >> "$DUMP"
          if [ -d "$BD" ]; then
            echo "Tree of $BD:" >> "$DUMP"
            find "$BD" -type f -printf '%p %s\n' >> "$DUMP" 2>&1
          else
            echo "(bundle directory does not exist)" >> "$DUMP"
          fi
          echo "" >> "$DUMP"
          echo "--- recursive find for setup/sig files anywhere ---" >> "$DUMP"
          find . -type f \( -name '*setup*' -o -name '*.sig' -o -name '*.msi' -o -name '*-setup.exe*' \) -printf '%p %s\n' >> "$DUMP" 2>&1
          echo "" >> "$DUMP"
          echo "--- tauri-build.log tail (last 100) ---" >> "$DUMP"
          if [ -f "$RUNNER_TEMP/tauri-build.log" ]; then
            tail -100 "$RUNNER_TEMP/tauri-build.log" >> "$DUMP" 2>&1
          else
            echo "(no tauri-build.log)" >> "$DUMP"
          fi
          echo "=== BUNDLE TREE DUMP ==="
          cat "$DUMP"
          echo "=== END DUMP ==="

      - name: Collect artifacts and generate update.json
        id: collect
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $diagFile = "$env:RUNNER_TEMP\diag\collect-diag.txt"
          New-Item -ItemType Directory -Force -Path (Split-Path $diagFile) | Out-Null
          $diag = [System.Collections.Generic.List[string]]::new()

          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag     = "${{ steps.ver.outputs.TAG }}"
          $repo    = "${{ github.repository }}"
          $cwd       = (Get-Location).Path
          $bundleAbs = Join-Path $cwd "src-tauri\target\release\bundle"
          $outAbs    = Join-Path $cwd "release-artifacts"

          $diag.Add("PWD: $cwd")
          $diag.Add("bundleAbs: $bundleAbs")
          $diag.Add("outAbs: $outAbs")
          $diag.Add("bundle exists: $(Test-Path $bundleAbs)")

          if (-not (Test-Path $bundleAbs)) {
            $diag.Add("FATAL: bundle dir missing")
            [System.IO.File]::WriteAllLines($diagFile, $diag)
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $outAbs | Out-Null

          $all = @(Get-ChildItem -Recurse -Path $bundleAbs -File)
          $diag.Add("Files in bundle ($($all.Count)):")
          foreach ($f in $all) { $diag.Add("  $($f.Name) :: $($f.FullName) ($($f.Length))") }

          # Find any .sig anywhere in bundle
          $allSigs = @($all | Where-Object { $_.Name -match '\.sig$' })
          $diag.Add("All .sig files ($($allSigs.Count)):")
          foreach ($f in $allSigs) { $diag.Add("  $($f.FullName)") }

          # Copy each known artifact pattern
          $patterns = @("*-setup.exe", "*-setup.exe.sig", "*_en-US.msi", "*_en-US.msi.sig", "*.nsis.zip", "*.nsis.zip.sig")
          foreach ($p in $patterns) {
            $matches = @($all | Where-Object { $_.Name -like $p })
            $diag.Add("Pattern '$p' matched $($matches.Count) files")
            foreach ($m in $matches) {
              $dest = Join-Path $outAbs $m.Name
              try {
                Copy-Item -LiteralPath $m.FullName -Destination $dest -Force -ErrorAction Stop
                $diag.Add("  copied: $($m.Name) -> $dest")
              } catch {
                $diag.Add("  COPY FAILED for $($m.FullName): $_")
              }
            }
          }

          $collected = @(Get-ChildItem -Path $outAbs -File -ErrorAction SilentlyContinue)
          $diag.Add("Collected ($($collected.Count)):")
          foreach ($f in $collected) { $diag.Add("  $($f.Name) ($($f.Length) bytes)") }

          $exeFile = $collected | Where-Object { $_.Name -like "*-setup.exe" } | Select-Object -First 1
          $sigFile = $collected | Where-Object { $_.Name -like "*-setup.exe.sig" } | Select-Object -First 1

          $diag.Add("exeFile: $($exeFile.Name)")
          $diag.Add("sigFile: $($sigFile.Name)")

          if ($exeFile -and $sigFile) {
            try {
              $signature = [System.IO.File]::ReadAllText($sigFile.FullName).Trim()
              $url = "https://github.com/$repo/releases/download/$tag/$($exeFile.Name)"
              $manifest = [ordered]@{
                version  = $version
                notes    = "See release notes: https://github.com/$repo/releases/tag/$tag"
                pub_date = (Get-Date -UTC -Format "yyyy-MM-ddTHH:mm:ssZ")
                platforms = [ordered]@{
                  "windows-x86_64" = [ordered]@{ signature = $signature; url = $url }
                }
              }
              $jsonPath = Join-Path $outAbs "update.json"
              $json = $manifest | ConvertTo-Json -Depth 10
              [System.IO.File]::WriteAllText($jsonPath, $json)
              $diag.Add("update.json written: $jsonPath")
              $diag.Add("sig length: $($signature.Length)")
              "HAVE_UPDATER=true" >> $env:GITHUB_OUTPUT
            } catch {
              $diag.Add("update.json gen failed: $_")
              "HAVE_UPDATER=false" >> $env:GITHUB_OUTPUT
            }
          } else {
            $diag.Add("NO UPDATER: missing exe=$($null -eq $exeFile) sig=$($null -eq $sigFile)")
            "HAVE_UPDATER=false" >> $env:GITHUB_OUTPUT
          }

          [System.IO.File]::WriteAllLines($diagFile, $diag)
          Write-Host "=== collect-diag.txt ==="
          Get-Content $diagFile
          Write-Host "=== END ==="

      - name: Push all diagnostics to ci-diagnostics branch (BASH)
        if: always()
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          DIAG_DIR="$RUNNER_TEMP/diag"
          if [ ! -d "$DIAG_DIR" ]; then
            mkdir -p "$DIAG_DIR"
            echo "no diag dir was created" > "$DIAG_DIR/empty.txt"
          fi
          ls -la "$DIAG_DIR"

          # Build a combined ci-diag.md
          CIDIAG="$RUNNER_TEMP/ci-diag.md"
          {
            echo "# CI Diagnostics - Run ${{ github.run_id }}"
            echo ""
            echo "- SHA: ${{ github.sha }}"
            echo "- Version: ${{ steps.ver.outputs.VERSION }}"
            echo "- Job status: ${{ job.status }}"
            echo "- HAVE_UPDATER: ${{ steps.collect.outputs.HAVE_UPDATER }}"
            echo "- Time: $(date -u +%FT%TZ)"
            echo ""
            echo "## collect-diag.txt"
            if [ -f "$DIAG_DIR/collect-diag.txt" ]; then
              echo '```'
              cat "$DIAG_DIR/collect-diag.txt"
              echo '```'
            else
              echo "(no collect-diag.txt)"
            fi
            echo ""
            echo "## bundle-tree.txt"
            if [ -f "$DIAG_DIR/bundle-tree.txt" ]; then
              echo '```'
              cat "$DIAG_DIR/bundle-tree.txt"
              echo '```'
            else
              echo "(no bundle-tree.txt)"
            fi
          } > "$CIDIAG"
          echo "=== ci-diag.md (built) ==="
          cat "$CIDIAG"
          echo "=== END ==="

          # Clone ci-diagnostics and push the diag file
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          CLONE_DIR="$RUNNER_TEMP/ci-diag-clone"
          rm -rf "$CLONE_DIR"
          git clone --branch ci-diagnostics --depth 1 "$REPO_URL" "$CLONE_DIR" 2>&1
          if [ $? -ne 0 ]; then
            git clone --depth 1 "$REPO_URL" "$CLONE_DIR" 2>&1
            git -C "$CLONE_DIR" checkout -b ci-diagnostics
          fi
          cp "$CIDIAG" "$CLONE_DIR/ci-diag.md"
          # Also save per-version copy
          mkdir -p "$CLONE_DIR/release-runs"
          cp "$CIDIAG" "$CLONE_DIR/release-runs/${{ steps.ver.outputs.VERSION }}.md"
          git -C "$CLONE_DIR" add ci-diag.md release-runs/
          git -C "$CLONE_DIR" commit -m "ci: diag run=${{ github.run_id }} v=${{ steps.ver.outputs.VERSION }} status=${{ job.status }}" 2>&1
          git -C "$CLONE_DIR" push origin ci-diagnostics 2>&1
          echo "push exit=$?"

      - name: Upload all diag files as artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-${{ steps.ver.outputs.VERSION }}
          path: ${{ runner.temp }}/diag/
          if-no-files-found: warn

      - name: Upload release artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows-${{ steps.ver.outputs.VERSION }}
          path: desktop/release-artifacts/
          if-no-files-found: warn

      - name: Upload tauri-build.log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ steps.ver.outputs.VERSION }}
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

      - name: Create GitHub Release
        if: steps.collect.outputs.HAVE_UPDATER == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true
