name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and uploads the
# NSIS .exe, MSI, and auto-update bundle (.nsis.zip) to a GitHub Release.
# Also generates update.json so installed copies auto-update to this version.
#
# Triggers:
#   - push to main that changes desktop/.trigger-release (Claude pushes
#     this file with the version string, e.g. "0.2.0", to cut a release)
#   - manual via workflow_dispatch (enter version in the input field)
#
# Required GitHub secrets:
#   TAURI_SIGNING_PRIVATE_KEY  — base64-encoded Ed25519 private key
#                                (generated once via `cargo tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — empty string (key has no password)

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release as (e.g. 0.2.0). Leave blank to build artifacts only."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build (release)
        run: |
          cd src-tauri
          cargo build --release
        shell: pwsh

      - name: Bundle (NSIS + MSI + update bundle)
        run: |
          cd src-tauri
          cargo install tauri-cli --version "^2" --locked --quiet
          cargo tauri build
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Collect installers and update bundle
        id: collect
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          # Full installers (for fresh installs)
          Get-ChildItem -Recurse -Path $bundle -Include *.exe,*.msi |
            ForEach-Object { Copy-Item $_.FullName $out }

          # Update bundle + signature (for auto-updates from installed copies)
          Get-ChildItem -Recurse -Path $bundle -Include *.nsis.zip,*.nsis.zip.sig |
            ForEach-Object { Copy-Item $_.FullName $out }

          Write-Host "Collected:"
          Get-ChildItem $out

      - name: Generate update.json
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag     = "${{ steps.ver.outputs.TAG }}"
          $out     = "release-artifacts"
          $repo    = "markbekhit/VoxRad"

          # Read signature file (the .nsis.zip.sig content is the raw sig string)
          $sigFile = Get-ChildItem $out -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if (-not $sigFile) {
            Write-Warning "No .nsis.zip.sig found — TAURI_SIGNING_PRIVATE_KEY secret is missing or empty. The installer will be uploaded but update.json will not be generated. Add the secret and re-run to enable auto-updates."
            exit 0
          }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()

          # Build download URL for the updater bundle
          $zipFile = Get-ChildItem $out -Filter "*.nsis.zip" | Select-Object -First 1
          $zipName = $zipFile.Name
          $url = "https://github.com/$repo/releases/download/$tag/$zipName"

          $manifest = [ordered]@{
            version  = $version
            notes    = "See release notes: https://github.com/$repo/releases/tag/$tag"
            pub_date = (Get-Date -UTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 "$out/update.json"
          Write-Host "update.json:"
          Get-Content "$out/update.json"

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows
          path: desktop/release-artifacts/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.ver.outputs.VERSION != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true
