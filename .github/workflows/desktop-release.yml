name: Desktop release (Windows)

# Builds the RadSpeed Windows desktop companion (Tauri) and uploads the
# NSIS .exe, MSI, and auto-update bundle (.nsis.zip) to a GitHub Release.
# Also generates update.json so installed copies auto-update to this version.
#
# Triggers:
#   - push to main that changes desktop/.trigger-release (Claude pushes
#     this file with the version string, e.g. "0.2.0", to cut a release)
#   - manual via workflow_dispatch (enter version in the input field)
#
# Signing key: embedded inline below as base64 (this is a private repo).
# The matching pubkey lives in desktop/src-tauri/tauri.conf.json. Generated
# once with `minisign -G -W` (passwordless Ed25519). Rotating it means:
# regenerate both halves, replace pubkey in tauri.conf.json, replace the
# base64 string below, bump version, and ship one manual installer to
# existing users (they pick up the new pubkey at install time, then all
# future updates are silent).

on:
  push:
    branches:
      - main
    paths:
      - "desktop/.trigger-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release as (e.g. 0.2.0). Leave blank to build artifacts only."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = (Get-Content .trigger-release -Raw).Trim()
          }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "TAG=desktop-v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build (release)
        run: |
          cd src-tauri
          cargo build --release
        shell: pwsh

      - name: Write signing key to file
        id: signing
        shell: pwsh
        run: |
          # Passwordless minisign Ed25519 key matched to the pubkey in
          # tauri.conf.json. Embedded directly because GitHub Secrets
          # repeatedly failed silently (unset/empty value → bundler
          # skipped updater artifacts → no auto-update). This file is in
          # a private repo so the key is only visible to collaborators.
          $keyB64 = ""
          $keyText = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($keyB64))
          $keyPath = Join-Path $env:RUNNER_TEMP "tauri_signing.key"
          [System.IO.File]::WriteAllText($keyPath, $keyText.Replace("`r`n", "`n"))
          "KEY_PATH=$keyPath" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Signing key written to $keyPath ($($keyText.Length) chars)"

      - name: Bundle (NSIS + MSI + update bundle)
        run: |
          cd src-tauri
          cargo install tauri-cli --version "^2" --locked --quiet
          cargo tauri build
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing.outputs.KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Verify updater bundle was produced
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $sig = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $zip = Get-ChildItem -Recurse -Path $bundle -Filter "*.nsis.zip"     -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sig -or -not $zip) {
            Write-Host "Bundle directory contents:"
            if (Test-Path $bundle) { Get-ChildItem -Recurse $bundle | Select-Object FullName, Length | Format-Table -AutoSize -Wrap }
            throw "Updater artifacts missing (.nsis.zip and/or .sig). Auto-update will not work — failing the build so we can see why."
          }
          Write-Host "Updater bundle: $($zip.FullName)"
          Write-Host "Signature:      $($sig.FullName)"

      - name: Diagnose bundle output
        if: always()
        shell: pwsh
        run: |
          $keyPath = "${{ steps.signing.outputs.KEY_PATH }}"
          Write-Host "=== Signing key path ==="
          Write-Host "KEY_PATH = '$keyPath'"
          if ($keyPath -and (Test-Path $keyPath)) {
            $f = Get-Item $keyPath
            Write-Host "Key file: $($f.FullName) ($($f.Length) bytes)"
            $firstLine = Get-Content $f.FullName -TotalCount 1
            Write-Host "First line: $firstLine"
            $lineCount = (Get-Content $f.FullName).Length
            Write-Host "Line count: $lineCount"
          } else {
            Write-Warning "Key file does not exist or path is empty"
          }
          Write-Host ""
          Write-Host "=== Bundle directory tree ==="
          $bundleDir = "src-tauri/target/release/bundle"
          if (Test-Path $bundleDir) {
            Get-ChildItem -Recurse $bundleDir | Select-Object FullName, Length | Format-Table -AutoSize -Wrap
          } else {
            Write-Warning "No bundle directory at $bundleDir"
          }

      - name: Collect installers and update bundle
        id: collect
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          # Full installers (for fresh installs)
          Get-ChildItem -Recurse -Path $bundle -Include *.exe,*.msi |
            ForEach-Object { Copy-Item $_.FullName $out }

          # Update bundle + signature (for auto-updates from installed copies)
          Get-ChildItem -Recurse -Path $bundle -Include *.nsis.zip,*.nsis.zip.sig |
            ForEach-Object { Copy-Item $_.FullName $out }

          Write-Host "Collected:"
          Get-ChildItem $out

      - name: Generate update.json
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $tag     = "${{ steps.ver.outputs.TAG }}"
          $out     = "release-artifacts"
          $repo    = "markbekhit/VoxRad"

          # Read signature file (the .nsis.zip.sig content is the raw sig string)
          $sigFile = Get-ChildItem $out -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if (-not $sigFile) {
            throw "No .nsis.zip.sig in release-artifacts — the Verify step should have already failed. Aborting."
          }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()

          # Build download URL for the updater bundle
          $zipFile = Get-ChildItem $out -Filter "*.nsis.zip" | Select-Object -First 1
          $zipName = $zipFile.Name
          $url = "https://github.com/$repo/releases/download/$tag/$zipName"

          $manifest = [ordered]@{
            version  = $version
            notes    = "See release notes: https://github.com/$repo/releases/tag/$tag"
            pub_date = (Get-Date -UTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 "$out/update.json"
          Write-Host "update.json:"
          Get-Content "$out/update.json"

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: radspeed-windows
          path: desktop/release-artifacts/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.ver.outputs.VERSION != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ${{ steps.ver.outputs.TAG }}
          generate_release_notes: true
          files: desktop/release-artifacts/*
          fail_on_unmatched_files: true
