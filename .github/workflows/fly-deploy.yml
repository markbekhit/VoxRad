name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency: deploy-group

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Login to Fly.io registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: registry.fly.io/voxrad-v-hkvq:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure persistent volume exists
        run: |
          echo "=== Current volumes ==="
          flyctl volumes list -a voxrad-v-hkvq || true
          if flyctl volumes list -a voxrad-v-hkvq 2>/dev/null | grep -q voxrad_data; then
            echo "=== Volume voxrad_data already exists, skipping creation ==="
          else
            echo "=== Volume not found, creating... ==="
            flyctl volumes create voxrad_data --size 1 --region syd -a voxrad-v-hkvq --yes
            echo "=== Volume created, waiting 15s for Fly to register it ==="
            sleep 15
            flyctl volumes list -a voxrad-v-hkvq
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Destroy legacy machines missing the voxrad_data mount
        # Machines created before [[mounts]] was added to fly.toml do not have
        # the volume attached. Fly's deploy then refuses because it counts those
        # mount-less machines as needing fresh volumes. Destroy them so the
        # deploy step can create new ones that attach the existing volume.
        # This is safe: persistent data lives on the volume, not the machine.
        run: |
          flyctl machines list -a voxrad-v-hkvq --json > /tmp/machines.json
          python3 - <<'PY'
          import json, subprocess
          with open("/tmp/machines.json") as f:
              machines = json.load(f)
          for m in machines:
              mid = m.get("id")
              mounts = (m.get("config") or {}).get("mounts") or []
              has_data_mount = any(mt.get("name") == "voxrad_data" for mt in mounts)
              if not has_data_mount:
                  print(f"Destroying legacy machine {mid} (no voxrad_data mount)")
                  subprocess.run(
                      ["flyctl", "machine", "destroy", mid, "-a", "voxrad-v-hkvq", "--force"],
                      check=False,
                  )
              else:
                  print(f"Keeping machine {mid} (already has voxrad_data mount)")
          PY
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --image registry.fly.io/voxrad-v-hkvq:${{ github.sha }} --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
