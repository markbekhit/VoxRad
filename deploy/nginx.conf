# nginx reverse proxy for VoxRad — TLS termination.
#
# Place your TLS certificates at:
#   deploy/certs/fullchain.pem
#   deploy/certs/privkey.pem
#
# Then start with:
#   docker compose --profile nginx up -d

server {
    listen 80;
    server_name _;
    # Redirect all HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;                  # Replace with your hostname.

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern TLS only.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Audio uploads can be large (up to 100 MB per the app limit).
    client_max_body_size 110m;

    # Increase timeouts for long transcription/formatting requests.
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    location / {
        proxy_pass         http://voxrad:8765;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
